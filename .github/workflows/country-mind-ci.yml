name: Country Mind CI

on:
  push:
    paths:
      - ".github/workflows/country-mind-ci.yml"
      - "data/uk/**"
      - "docs/COUNTRY_MIND.md"
      - "pyproject.toml"
      - "src/**"
      - "tests/**"
  pull_request:
    paths:
      - ".github/workflows/country-mind-ci.yml"
      - "data/uk/**"
      - "docs/COUNTRY_MIND.md"
      - "pyproject.toml"
      - "src/**"
      - "tests/**"

jobs:
  test-country-mind:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run country-mind tests
        run: bash scripts/test_country_mind.sh

